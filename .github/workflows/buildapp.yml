name: Build and Release YTAG

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube ipa"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "i.am.kain.ytag"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube Afterglow"
        required: true
        type: string
      upload_artifact:
        description: "Upload iPA as artifact"
        default: true
        required: false
        type: boolean
      create_release:
        description: "Create a release"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTAG
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HAS_SIGNING: ${{ secrets.P12_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install ldid dpkg make

      - name: Set PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos
        id: theos
        uses: actions/cache@v5
        env:
          cache-name: theos_cache_13c2237
        with:
          path: theos/
          key: ${{ env.cache-name }}-${{ inputs.sdk_version }}
          restore-keys: ${{ env.cache-name }}-${{ inputs.sdk_version }}

      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Get YouTube version
        run: |
          wget "${{ github.event.inputs.decrypted_youtube_url }}" --quiet --no-verbose --no-check-certificate -O youtube.ipa
          mkdir -p tmp && unzip -q youtube.ipa -d tmp
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' tmp/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV
          rm -rf tmp
          YTLITE_VERSION=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/dayanch96/YTLite/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "YTLITE_VERSION=${YTLITE_VERSION:-5.2b4}" >> $GITHUB_ENV

      - name: Extract YTLite dylib and bundle from deb
        run: |
          YTLITE_DEB=$(ls Tweaks/YTLite/*arm64.deb | head -1)
          mkdir -p ytlite_extract
          cd ytlite_extract
          ar x "../$YTLITE_DEB"
          tar xf data.tar* 2>/dev/null || true
          cd ..
          echo "YTLite dylib: $(find ytlite_extract -name 'YTLite.dylib' | head -1)"
          echo "YTLite bundle: $(find ytlite_extract -name 'YTLite.bundle' -type d | head -1)"

      - name: Build YTAG tweak
        run: |
          # Build main tweak without jailed module
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ytag.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build sub-tweaks
        run: |
          build_tweak() {
            local dir=$1
            local name=$2
            if [ -d "$dir" ] && [ -f "$dir/Makefile" ]; then
              echo "Building $name..."
              cd "$dir"
              make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 || echo "WARNING: $name build failed"
              if ls packages/*.deb 1>/dev/null 2>&1; then
                mv packages/*.deb "../../${name}.deb"
              fi
              cd ../..
            fi
          }

          build_tweak Tweaks/YouPiP youpip
          build_tweak Tweaks/YTUHD ytuhd
          build_tweak Tweaks/Return-YouTube-Dislikes ryd
          build_tweak Tweaks/YTABConfig ytabc
          build_tweak Tweaks/DontEatMyContent demc
          build_tweak Tweaks/YTVideoOverlay ytvo
          build_tweak Tweaks/YouTimeStamp yts
          build_tweak Tweaks/YouGroupSettings ygs

          # Build Alderis framework
          if [ -d "Tweaks/Alderis" ]; then
            echo "Building Alderis..."
            cd Tweaks/Alderis
            make clean package DEBUG=0 FINALPACKAGE=1 2>&1 || echo "WARNING: Alderis build failed"
            cd ../..
          fi

          # Build libFLEX
          if [ -d "Tweaks/FLEXing/libflex" ]; then
            echo "Building libFLEX..."
            cd Tweaks/FLEXing/libflex
            make clean package DEBUG=0 FINALPACKAGE=1 2>&1 || echo "WARNING: libFLEX build failed"
            cd ../../..
          fi

          echo "=== Built debs ==="
          ls -la *.deb 2>/dev/null || echo "No debs found"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        id: build_package
        run: |
          # Collect all dylibs and frameworks to inject
          INJECT_FILES=""

          # YTLite dylib from deb
          YTLITE_DYLIB=$(find ytlite_extract -name "YTLite.dylib" | head -1)
          if [ -n "$YTLITE_DYLIB" ]; then
            INJECT_FILES="$INJECT_FILES $YTLITE_DYLIB"
          fi

          # YTLite bundle
          YTLITE_BUNDLE=$(find ytlite_extract -name "YTLite.bundle" -type d | head -1)
          if [ -n "$YTLITE_BUNDLE" ]; then
            INJECT_FILES="$INJECT_FILES $YTLITE_BUNDLE"
          fi

          # YTAG tweak deb
          INJECT_FILES="$INJECT_FILES ytag.deb"

          # All other built debs
          for f in youpip.deb ytuhd.deb ryd.deb ytabc.deb demc.deb ytvo.deb yts.deb ygs.deb; do
            [ -f "$f" ] && INJECT_FILES="$INJECT_FILES $f"
          done

          # Safari extension
          if [ -d "Extensions" ]; then
            for appex in Extensions/*.appex; do
              [ -d "$appex" ] && INJECT_FILES="$INJECT_FILES $appex"
            done
          fi

          # YTLitePlus bundle (localization)
          if [ -d "lang/YTLitePlus.bundle" ]; then
            INJECT_FILES="$INJECT_FILES lang/YTLitePlus.bundle"
          fi

          # Bundles
          for bundle in Bundles/*.bundle; do
            [ -d "$bundle" ] && INJECT_FILES="$INJECT_FILES $bundle"
          done

          echo "Injecting: $INJECT_FILES"

          cyan -i youtube.ipa -o "packages/YTAG_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}.ipa" \
            -uwef $INJECT_FILES \
            -n "${{ github.event.inputs.app_name }}" \
            -b "${{ github.event.inputs.bundle_id }}"

          echo "package=YTAG_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}.ipa" >> $GITHUB_OUTPUT
          echo -e "==> \033[1mBundle ID: ${{ github.event.inputs.bundle_id }}\033[0m"

      - name: Upload Unsigned Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: YTAG_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}_unsigned
          path: packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Sign IPA
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$P12_BASE64" | base64 --decode > cert.p12
          printf '%s' "$MOBILEPROVISION_BASE64" | base64 --decode > profile.mobileprovision

          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -o '".*"' | tr -d '"')
          echo "Signing with: $SIGNING_IDENTITY"

          IPA_FILE="packages/${{ steps.build_package.outputs.package }}"
          mkdir -p ipa_contents
          unzip -q "$IPA_FILE" -d ipa_contents
          APP_DIR=$(find ipa_contents/Payload -maxdepth 1 -name "*.app" -type d | head -1)

          cp profile.mobileprovision "$APP_DIR/embedded.mobileprovision"

          security cms -D -i profile.mobileprovision > profile_full.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" profile_full.plist > entitlements.plist

          # Sign frameworks, dylibs, and plugins first
          find "$APP_DIR" -name "*.framework" -type d | while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true
          done
          find "$APP_DIR" -name "*.dylib" -type f | while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true
          done
          find "$APP_DIR" -name "*.appex" -type d | while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none --entitlements entitlements.plist "$item" || true
          done
          # Sign the app itself last
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none --entitlements entitlements.plist "$APP_DIR"

          cd ipa_contents
          zip -qr "../packages/YTAG_signed.ipa" Payload
          cd ..
          rm -rf ipa_contents cert.p12 profile.mobileprovision profile_full.plist entitlements.plist

      - name: Generate OTA manifest
        if: ${{ env.HAS_SIGNING == 'true' && inputs.create_release }}
        run: |
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}/YTAG_signed.ipa"
          BUNDLE_ID="${{ inputs.bundle_id }}"
          DISPLAY_NAME="${{ inputs.app_name }}"
          cat > manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${IPA_URL}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>${BUNDLE_ID}</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>${DISPLAY_NAME}</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          PLIST

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}
          name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }} - YouTube Afterglow
          files: |
            packages/*.ipa
            manifest.plist

      - name: OTA Install Link
        if: ${{ env.HAS_SIGNING == 'true' && inputs.create_release }}
        run: |
          MANIFEST_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}/manifest.plist"
          OTA_LINK="itms-services://?action=download-manifest&url=${MANIFEST_URL}"
          echo "::notice::OTA Install: ${OTA_LINK}"
          echo "## OTA Install" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Install YouTube Afterglow](${OTA_LINK})" >> $GITHUB_STEP_SUMMARY
